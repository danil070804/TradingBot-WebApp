<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Trading Bot WebApp{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<div class="layout">
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-mark"></div>
            <div>
                <div class="logo-title">Trading Bot</div>
                <div class="logo-subtitle">Control Center</div>
            </div>
        </div>
        <nav class="nav">
            <a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">Дашборд</a>
            <a href="/users" class="{% if active_page == 'users' %}active{% endif %}">Пользователи</a>
            <a href="/deals" class="{% if active_page == 'deals' %}active{% endif %}">Сделки</a>
            <a href="/withdrawals" class="{% if active_page == 'withdrawals' %}active{% endif %}">Выводы</a>
        </nav>
        <div class="sidebar-footer">DB: {{ request.app.title }}</div>
    </aside>

    <main class="content">
        {% block content %}{% endblock %}
    </main>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
