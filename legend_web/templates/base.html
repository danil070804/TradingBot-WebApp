<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Legend Trading{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Oxanium:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/legend.css">
</head>
<body>
<div class="page-bg"></div>
<div class="app-shell">
    <header class="topbar">
        <div class="brand">
            <span class="brand-mark">L</span>
            <div>
                <div class="brand-title">Legend Trading</div>
                <div class="brand-sub">Bot WebApp</div>
            </div>
        </div>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <nav class="bottom-nav">
        <a href="/" class="{% if page == 'home' %}active{% endif %}">Главная</a>
        <a href="/markets" class="{% if page == 'markets' %}active{% endif %}">Рынки</a>
        <a href="/trade" class="{% if page == 'trade' %}active{% endif %}">Торговля</a>
        <a href="/deposit" class="{% if page == 'deposit' %}active{% endif %}">Пополнить</a>
        <a href="/deals" class="{% if page == 'deals' %}active{% endif %}">Сделки</a>
        <a href="/profile" class="{% if page == 'profile' %}active{% endif %}">Профиль</a>
    </nav>
</div>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/static/js/legend.js"></script>
</body>
</html>
