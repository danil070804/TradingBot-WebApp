{% extends "base.html" %}
{% block title %}График | Legend Trading{% endblock %}
{% block content %}
<section class="card chart-fullscreen-card">
    <div class="chart-fs-head">
        <a class="chip chart-back-btn" href="/trade">← Торговля</a>
        <div class="section-title">Live Chart</div>
    </div>
    <div class="chart-controls">
        <select id="chart-symbol-select" name="asset_name" class="chart-tf">
            {% for a in assets %}
            <option value="{{ a.name }}" {% if selected_symbol and selected_symbol == a.name %}selected{% endif %}>{{ a.name }}</option>
            {% endfor %}
        </select>
        <div class="chart-tf-pills">
            <button type="button" class="chip chart-tf-btn active" data-tf="60">1m</button>
            <button type="button" class="chip chart-tf-btn" data-tf="300">5m</button>
            <button type="button" class="chip chart-tf-btn" data-tf="900">15m</button>
            <button type="button" class="chip chart-tf-btn" data-tf="3600">1h</button>
        </div>
        <select id="chart-tf" class="chart-tf">
            <option value="60" selected>1m</option>
            <option value="300">5m</option>
            <option value="900">15m</option>
            <option value="3600">1h</option>
        </select>
    </div>
    <div class="chart-tools">
        <button type="button" id="chart-reset-btn" class="chip">Reset</button>
        <button type="button" id="chart-fit-btn" class="chip">Fit</button>
        <button type="button" id="chart-crosshair-btn" class="chip">Crosshair</button>
        <button type="button" id="chart-lock-btn" class="chip active">Live Lock</button>
    </div>
    <div id="tv-chart" class="tv-chart tv-chart-fullscreen" data-chart-mode="fullscreen" data-limit="300"></div>
    <canvas id="candle-canvas" width="430" height="180" style="display:none;"></canvas>
</section>

<section class="card">
    <div class="section-title">{{ labels.trade_order_book if labels else "Order Book" }}</div>
    <div class="book">
        <div id="orderbook-asks">
            <div class="book-row ask"><span>--</span><em>--</em></div>
            <div class="book-row ask"><span>--</span><em>--</em></div>
        </div>
        <div class="book-mid">MARK <span id="orderbook-mark">--</span></div>
        <div id="orderbook-bids">
            <div class="book-row bid"><span>--</span><em>--</em></div>
            <div class="book-row bid"><span>--</span><em>--</em></div>
        </div>
    </div>
    <div class="section-title tape-title">{{ labels.live_tape if labels else "Лента рынка (live)" }}</div>
    <div class="mini-tape" id="mini-tape">
        <div class="row mono"><div><b>--</b><small>--</small></div><div>--</div></div>
    </div>
</section>

<script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
{% endblock %}
