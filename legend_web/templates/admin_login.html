<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Legend Trading Admin Login</title>
    <link rel="stylesheet" href="/static/css/legend.css">
</head>
<body class="app-ready">
<div class="page-bg"></div>
<div class="app-shell">
    <main class="content">
        <section class="card hero">
            <div class="markets-hero-top">
                <div class="markets-hero-copy">
                    <h1>Admin Login</h1>
                    <strong class="markets-hero-headline">Вход в административный контур</strong>
                    <p class="markets-hero-lead">Доступ только для администратора. Используйте Telegram WebApp или логин и пароль.</p>
                </div>
            </div>
        </section>
        <section class="card">
            <div class="deposit-panel-head">
                <div>
                    <div class="section-title">Авторизация</div>
                    <strong class="deposit-panel-title">Подтверждение доступа</strong>
                </div>
            </div>
            <form id="admin-login-form" class="form-grid">
                <label>Логин
                    <input name="username" required>
                </label>
                <label>Пароль
                    <input type="password" name="password" required>
                </label>
                <button class="submit" type="submit">Войти</button>
            </form>
            <div id="admin-login-result" class="result-box"></div>
        </section>
    </main>
</div>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
async function initTelegramAdminAuth() {
    if (!window.Telegram || !window.Telegram.WebApp) return;
    const wa = window.Telegram.WebApp;
    wa.ready();
    wa.expand();
    if (!wa.initData) return;
    try {
        const resp = await fetch("/api/auth/telegram", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ init_data: wa.initData })
        });
        const data = await resp.json();
        if (resp.ok && data.ok) {
            window.location.href = "/admin";
        }
    } catch (_) {
        // no-op
    }
}

document.getElementById("admin-login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const result = document.getElementById("admin-login-result");
    const body = Object.fromEntries(new FormData(e.target).entries());
    const resp = await fetch("/admin/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body)
    });
    const data = await resp.json();
    if (resp.ok && data.ok) {
        window.location.href = "/admin";
        return;
    }
    result.innerHTML = `<span class="neg">Ошибка входа</span>`;
});

initTelegramAdminAuth();
</script>
</body>
</html>
